<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 13 - DOM Manipulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Day 13 Internship Task</h1>

    <h2>JavaScript DOM Manipulation</h2>

    <p id="text">
        This is the original paragraph.
    </p>

    <button onclick="changeText()">Change Text</button>
    <button onclick="changeColor()">Change Color</button>
    <button onclick="hideText()">Hide Text</button>
    <button onclick="showText()">Show Text</button>
    <button onclick="changeImage()">Change Image</button>

    <br><br>

    <img id="image"
         src="https://via.placeholder.com/250x150?text=Original+Image"
         alt="Sample Image">

    <hr>

    <h2>User Input Example</h2>

    <input type="text" id="name" placeholder="Enter Your Name">

    <button onclick="displayName()">Display Name</button>

    <h3 id="result"></h3>

    <script src="script.js"></script>

</body>
</html>
